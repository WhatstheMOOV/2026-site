<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOV for Your School</title>
    <link rel="icon" type="image/png" href="/images/moov-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f0f0;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .state-msg {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            font-size: 1.125rem;
            color: #666;
        }
        .state-msg.error { color: #c0392b; }

        /* ===== ID CARD ===== */
        .id-card {
            position: relative;
            width: 680px;
            aspect-ratio: 1.586;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 12px rgba(0,0,0,0.1);
            background: #d4d4d4;
        }

        .id-card-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.35;
            z-index: 0;
        }

        /* Absolute positioning for all card elements */
        .id-card-content {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
        }

        /* Student photo — top left */
        .card-photo {
            position: absolute;
            top: 5%;
            left: 4%;
            width: 36%;
            aspect-ratio: 1;
            border: 5px solid #111;
            background: #fff;
            overflow: hidden;
            z-index: 3;
        }
        .card-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* School title — top right */
        .card-school-title {
            position: absolute;
            top: 5%;
            left: 42%;
            right: 4%;
            font-size: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            text-align: right;
            line-height: 1.2;
            text-shadow:
                -2px -2px 0 #fff, 2px -2px 0 #fff,
                -2px 2px 0 #fff, 2px 2px 0 #fff,
                0 -2px 0 #fff, 0 2px 0 #fff,
                -2px 0 0 #fff, 2px 0 0 #fff;
        }

        /* Year strip — spans from photo right edge to card right edge */
        .card-year-strip {
            position: absolute;
            top: 42%;
            left: 40%;
            right: 0;
            height: 22%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            z-index: 2;
        }

        .year-strip-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .year-strip-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            width: 100%;
        }

        .year-text {
            font-size: 2.75rem;
            font-weight: 900;
            letter-spacing: 0.02em;
            padding: 0 0.5rem;
            flex: 1;
            text-align: center;
            text-shadow:
                -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000,
                -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000;
        }

        .card-logo-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            z-index: 2;
        }
        .card-logo-circle img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        /* Student name — bottom left */
        .card-student-name {
            position: absolute;
            bottom: 14%;
            left: 4%;
            font-size: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        /* Barcode — bottom right */
        .card-barcode {
            position: absolute;
            bottom: 12%;
            right: 4%;
        }
        .barcode-svg {
            width: 130px;
            height: 44px;
        }

        /* Footer strip — very bottom */
        .card-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 4%;
            font-size: 0.6rem;
            color: #333;
        }
        .card-footer-left {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .card-footer-left img {
            width: 18px;
            height: 18px;
        }

        /* ===== CTA below card ===== */
        .cta-section {
            text-align: center;
            margin-top: 2.5rem;
        }
        .cta-section p {
            font-size: 1rem;
            color: #555;
            margin-bottom: 1rem;
        }
        .btn-demo {
            display: inline-block;
            padding: 0.875rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            text-decoration: none;
            transition: opacity 0.15s;
            background: #111;
        }
        .btn-demo:hover { opacity: 0.9; }

        /* Responsive */
        @media (max-width: 720px) {
            .id-card { width: 100%; max-width: 480px; }
            .card-school-title { font-size: 0.85rem; }
            .year-text { font-size: 1.75rem; }
            .card-logo-circle { width: 56px; height: 56px; }
            .card-student-name { font-size: 0.9rem; }
            .card-footer { font-size: 0.5rem; }
            .barcode-svg { width: 90px; height: 32px; }
        }
    </style>
</head>
<body>
    <div class="state-msg" id="loading">Loading&hellip;</div>
    <div class="state-msg error" id="error" style="display:none;"></div>

    <div id="page" style="display:none;">
        <div class="id-card" id="idCard">
            <div class="id-card-bg" id="cardBg"></div>

            <div class="id-card-content">
                <!-- Student photo -->
                <div class="card-photo">
                    <img src="/images/kevin.png" alt="Student photo">
                </div>

                <!-- School title -->
                <div class="card-school-title" id="cardTitle"></div>

                <!-- Year strip — full width from photo to right edge -->
                <div class="card-year-strip">
                    <div class="year-strip-bg" id="yearStripBg"></div>
                    <div class="year-strip-content">
                        <span class="year-text" id="yearLeft">2026</span>
                        <div class="card-logo-circle" id="logoCircle">
                            <img id="cardLogo" src="" alt="">
                        </div>
                        <span class="year-text" id="yearRight">2027</span>
                    </div>
                </div>

                <!-- Student name -->
                <div class="card-student-name" id="studentName">BART SIMPSON</div>

                <!-- Barcode -->
                <div class="card-barcode">
                    <svg class="barcode-svg" viewBox="0 0 140 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="0" width="2" height="38" fill="#111"/>
                        <rect x="6" y="0" width="1" height="38" fill="#111"/>
                        <rect x="9" y="0" width="3" height="38" fill="#111"/>
                        <rect x="14" y="0" width="1" height="38" fill="#111"/>
                        <rect x="17" y="0" width="2" height="38" fill="#111"/>
                        <rect x="21" y="0" width="1" height="38" fill="#111"/>
                        <rect x="24" y="0" width="3" height="38" fill="#111"/>
                        <rect x="29" y="0" width="1" height="38" fill="#111"/>
                        <rect x="32" y="0" width="2" height="38" fill="#111"/>
                        <rect x="36" y="0" width="1" height="38" fill="#111"/>
                        <rect x="39" y="0" width="2" height="38" fill="#111"/>
                        <rect x="43" y="0" width="3" height="38" fill="#111"/>
                        <rect x="48" y="0" width="1" height="38" fill="#111"/>
                        <rect x="51" y="0" width="2" height="38" fill="#111"/>
                        <rect x="55" y="0" width="1" height="38" fill="#111"/>
                        <rect x="58" y="0" width="3" height="38" fill="#111"/>
                        <rect x="63" y="0" width="1" height="38" fill="#111"/>
                        <rect x="66" y="0" width="2" height="38" fill="#111"/>
                        <rect x="70" y="0" width="1" height="38" fill="#111"/>
                        <rect x="73" y="0" width="2" height="38" fill="#111"/>
                        <rect x="77" y="0" width="3" height="38" fill="#111"/>
                        <rect x="82" y="0" width="1" height="38" fill="#111"/>
                        <rect x="85" y="0" width="2" height="38" fill="#111"/>
                        <rect x="89" y="0" width="1" height="38" fill="#111"/>
                        <rect x="92" y="0" width="3" height="38" fill="#111"/>
                        <rect x="97" y="0" width="1" height="38" fill="#111"/>
                        <rect x="100" y="0" width="2" height="38" fill="#111"/>
                        <rect x="104" y="0" width="1" height="38" fill="#111"/>
                        <rect x="107" y="0" width="2" height="38" fill="#111"/>
                        <rect x="111" y="0" width="3" height="38" fill="#111"/>
                        <rect x="116" y="0" width="1" height="38" fill="#111"/>
                        <rect x="119" y="0" width="2" height="38" fill="#111"/>
                        <rect x="123" y="0" width="1" height="38" fill="#111"/>
                        <rect x="126" y="0" width="3" height="38" fill="#111"/>
                        <rect x="131" y="0" width="1" height="38" fill="#111"/>
                        <rect x="134" y="0" width="2" height="38" fill="#111"/>
                    </svg>
                </div>

                <!-- Footer -->
                <div class="card-footer">
                    <div class="card-footer-left">
                        <img src="/images/moov-logo.png" alt="MOOV">
                        <span>Earn rewards at student.joinmoov.com</span>
                    </div>
                    <span>Date Issued: 01/01/2026</span>
                </div>
            </div>
        </div>

        <div class="cta-section">
            <p>See how MOOV works for <span id="ctaName"></span></p>
            <a href="/demo" class="btn-demo" id="btnDemo">Get a Demo</a>
        </div>
    </div>

    <script>
        (async function () {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const pageEl = document.getElementById('page');

            function showError(msg) {
                loadingEl.style.display = 'none';
                errorEl.textContent = msg;
                errorEl.style.display = 'flex';
            }

            const parts = window.location.pathname.replace(/\/+$/, '').split('/');
            const slug = parts[parts.length - 1];

            if (!slug || slug === 'example') {
                showError('No school specified.');
                return;
            }

            let schools;
            try {
                const res = await fetch('/data/schools.json');
                if (!res.ok) throw new Error('Failed to load schools data.');
                schools = await res.json();
            } catch (e) {
                showError(e.message);
                return;
            }

            const school = schools[slug];
            if (!school) {
                showError('School not found.');
                document.title = '404 \u2014 School Not Found';
                return;
            }

            document.title = `MOOV for ${school.name}`;

            const primary = school.colors?.primary || '#111111';
            const secondary = school.colors?.secondary || '#666666';

            function darkenHex(hex, factor) {
                hex = hex.replace('#', '');
                const r = Math.round(parseInt(hex.substring(0, 2), 16) * factor);
                const g = Math.round(parseInt(hex.substring(2, 4), 16) * factor);
                const b = Math.round(parseInt(hex.substring(4, 6), 16) * factor);
                return `rgb(${r},${g},${b})`;
            }

            const darkPrimary = darkenHex(primary, 0.35);

            // School title
            const titleEl = document.getElementById('cardTitle');
            titleEl.textContent = school.name;
            if (school.showColors) {
                titleEl.style.color = primary;
            }

            // Student name
            if (school.showColors) {
                document.getElementById('studentName').style.color = primary;
            }

            // Year strip
            const yearStripBg = document.getElementById('yearStripBg');
            if (school.showColors) {
                yearStripBg.style.background = darkPrimary;
                document.getElementById('yearLeft').style.color = primary;
                document.getElementById('yearRight').style.color = primary;
            } else {
                yearStripBg.style.background = 'rgba(0,0,0,0.5)';
                document.getElementById('yearLeft').style.color = '#fff';
                document.getElementById('yearRight').style.color = '#fff';
            }

            // Logo circle
            const logoCircle = document.getElementById('logoCircle');
            if (school.showColors) {
                logoCircle.style.borderColor = darkPrimary;
            }
            if (school.showLogo && school.logo) {
                document.getElementById('cardLogo').src = school.logo;
                document.getElementById('cardLogo').alt = school.name + ' logo';
            } else {
                logoCircle.style.display = 'none';
            }

            // Background image
            if (school.backgroundImage) {
                document.getElementById('cardBg').style.backgroundImage =
                    `url(${school.backgroundImage})`;
            }

            // CTA
            document.getElementById('ctaName').textContent = school.name;
            if (school.showColors) {
                document.getElementById('btnDemo').style.background = primary;
            }

            loadingEl.style.display = 'none';
            pageEl.style.display = 'block';
        })();
    </script>
</body>
</html>
